name: Publish v2 dbt Docs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-dbt-docs-v2.yml"
      - "v2/src/dbt/**"
      - "v2/pyproject.toml"
      - "v2/requirements-dev.txt"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            v2/pyproject.toml
            v2/requirements-dev.txt

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dbt docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ./v2[dev] dbt-duckdb

      - name: Create temporary dbt profile
        run: |
          mkdir -p "${RUNNER_TEMP}/dbt-profile"
          cat <<'EOF' > "${RUNNER_TEMP}/dbt-profile/profiles.yml"
          twitch_chat_pipeline_v2:
            target: docs
            outputs:
              docs:
                type: duckdb
                path: ":memory:"
                threads: 1
          EOF

      - name: Generate dbt docs
        working-directory: v2/src/dbt
        run: dbt docs generate --empty-catalog --profiles-dir "${RUNNER_TEMP}/dbt-profile"

      - name: Ensure GitHub Pages serves raw static assets
        run: touch v2/src/dbt/target/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: v2/src/dbt/target

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
